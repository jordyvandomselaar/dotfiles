# ~/.tmux.conf

# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Set mouse scroll speed
bind -Tcopy-mode WheelUpPane send -N1 -X scroll-up
bind -Tcopy-mode WheelDownPane send -N1 -X scroll-down

# Mouse drag copies selection but stays in copy mode
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# # Change prefix to Ctrl+space (more ergonomic)
# unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Enable extended keys
set -g extended-keys on
set -g extended-keys-format csi-u

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Text selection
set-option -g -w xterm-keys on

# Use emacs keybinds for command-line and copy mode
set -g mode-keys emacs
set -g status-keys emacs

# Use spacebar to enter selection mode in copy mode
bind -T copy-mode Space send-keys -X begin-selection

# Use c to copy selection and cancel copy mode
bind -T copy-mode c send-keys -X copy-selection-and-cancel

# Enter copy mode
bind Space copy-mode

# Better pane splitting (and keep current path)
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind -n C-d split-window -h -c "#{pane_current_path}"
bind -n C-S-d split-window -v -c "#{pane_current_path}"
bind -n C-w kill-pane
bind -n C-z resize-pane -Z


# Window management
bind -n C-t new-window -c "#{pane_current_path}"
bind -n C-r command-prompt -I "#W" "rename-window '%%'"

# Session management
bind -n C-n new-session

# Page Up/Down scroll
bind -n PPage copy-mode -u
bind -n NPage copy-mode \; send-keys NPage

# Search
bind -n C-f copy-mode \; send-keys C-r


# Shift+arrow key pane resizing
bind -r S-Left resize-pane -L 5
bind -r S-Down resize-pane -D 5
bind -r S-Up resize-pane -U 5
bind -r S-Right resize-pane -R 5

# ============================================
# APPEARANCE
# ============================================

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style 'bg=#13161d fg=#8b949e'
set -g status-left-length 20
set -g status-right-length 50

# Status bar content
set -g status-left '#[fg=#00e68a,bold] #S #[fg=#30363d]│ '
set -g status-right '#[fg=#30363d]│#[fg=#8b949e] %H:%M #[fg=#30363d]│#[fg=#8b949e] %d-%b-%y '

# Window status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#00e68a,bold] #I:#W '

# Pane border colors
set -g pane-border-style 'fg=#30363d'
set -g pane-active-border-style 'fg=#00e68a'

# Message styling
set -g message-style 'bg=#00e68a fg=#000000 bold'

# ============================================
# PLUGINS (via TPM)
# ============================================

# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'omerxx/tmux-sessionx'

# Plugin settings
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'

set -g @sessionx-prefix off
set -g @sessionx-filter-current 'false'
set -g @sessionx-window-mode 'off'
set -g @sessionx-ls-command 'll'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-fzf-builtin-tmux 'on'
set -g @sessionx-bind 'C-s'
set -g @sessionx-window-mode 'on'
set -g @sessionx-tree-mode 'off'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
